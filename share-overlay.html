<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Предпросмотр трансляции</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    }
    .bar {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      background: #111;
      color: #fff;
      border-bottom: 1px solid #2a2a2a;
    }
    .title {
      flex: 1;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }
    button {
      border: 1px solid #3a3a3a;
      background: #1f1f1f;
      color: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #2a2a2a; }
    .opacity-wrap {
      display: none;
    }
  </style>
</head>
<body>
  <div class="bar">
    <button id="backBtn" type="button">Назад</button>
    <button id="stopBtn" type="button">Завершить демонстрацию</button>
    <div class="opacity-wrap">
      <span>Прозрачность</span>
      <input id="opacityRange" type="range" min="0" max="100" step="1" value="90" />
      <span id="opacityValue">90%</span>
    </div>
    <div class="title">Предпросмотр выбранного источника</div>
  </div>
  <script>
    (async function init() {
      const sourceId = decodeURIComponent((location.hash || '').replace(/^#/, ''));
      const backBtn = document.getElementById('backBtn');
      const stopBtn = document.getElementById('stopBtn');
      const opacityRange = document.getElementById('opacityRange');
      const opacityValue = document.getElementById('opacityValue');

      backBtn.addEventListener('click', () => {
        window.overlayControls?.back?.();
      });
      stopBtn.addEventListener('click', () => {
        window.overlayControls?.stopShare?.();
      });

      const syncOpacityUi = (val01) => {
        const percent = Math.max(0, Math.min(100, Math.round(Number(val01 || 0) * 100)));
        opacityRange.value = String(percent);
        opacityValue.textContent = percent + '%';
      };

      try {
        const initialOpacity = await window.overlayControls?.getCaptureOpacity?.();
        if (typeof initialOpacity === 'number') syncOpacityUi(initialOpacity);
      } catch (_) {}

      opacityRange.addEventListener('input', () => {
        const percent = Number(opacityRange.value || 0);
        opacityValue.textContent = percent + '%';
        window.overlayControls?.setCaptureOpacity?.(percent / 100);
      });

      if (!sourceId) return;
    })();
  </script>
</body>
</html>
