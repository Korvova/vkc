<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 10px;
      box-sizing: border-box;
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button {
      font: 14px/1 system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.6);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    button:active {
      transform: translateY(1px);
    }
    #close {
      background: rgba(140,0,0,0.72);
      border-color: rgba(255,120,120,0.35);
    }
    .tab-btn {
      background: rgba(20,20,20,0.8);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs">
      <button id="tab-schedule" class="tab-btn">Вкладка: Расписание</button>
      <button id="tab-capture" class="tab-btn">Вкладка: HDMI Capture</button>
      <button id="tab-join" class="tab-btn">Вкладка: Join Widget</button>
    </div>
    <div class="actions">
      <button id="back">Назад к расписанию</button>
      <button id="close">Закрыть</button>
    </div>
  </div>
  <script>
    document.getElementById('tab-schedule').addEventListener('click', () => {
      window.controls?.switchTab?.('schedule');
    });
    document.getElementById('tab-capture').addEventListener('click', () => {
      window.controls?.switchTab?.('capture');
    });
    document.getElementById('tab-join').addEventListener('click', () => {
      window.controls?.switchTab?.('join');
    });
    document.getElementById('back').addEventListener('click', () => {
      window.controls?.goHome();
    });
    document.getElementById('close').addEventListener('click', () => {
      window.controls?.closeApp();
    });
  </script>
</body>
</html>
