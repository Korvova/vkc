<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 10px;
      box-sizing: border-box;
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .share-audio-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font: 13px/1 system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 10px;
      user-select: none;
    }
    .share-audio-toggle input {
      width: 16px;
      height: 16px;
      accent-color: #2d8cff;
    }
    button {
      font: 14px/1 system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.6);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    button:active {
      transform: translateY(1px);
    }
    #close {
      background: rgba(140,0,0,0.72);
      border-color: rgba(255,120,120,0.35);
    }
    .tab-btn {
      background: rgba(20,20,20,0.8);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs">
      <button id="tab-schedule" class="tab-btn">Вкладка: Расписание</button>
      <button id="tab-capture" class="tab-btn">Вкладка: HDMI Capture</button>
      <button id="tab-join" class="tab-btn">Вкладка: Join Widget</button>
    </div>
    <div class="actions">
      <label class="share-audio-toggle" for="forceTabAudio">
        <input id="forceTabAudio" type="checkbox" />
        Передавать звук вкладки
      </label>
      <button id="back">Назад к расписанию</button>
      <button id="close">Закрыть</button>
    </div>
  </div>
  <script>
    const forceTabAudio = document.getElementById('forceTabAudio');
    document.getElementById('tab-schedule').addEventListener('click', () => {
      window.controls?.switchTab?.('schedule');
    });
    document.getElementById('tab-capture').addEventListener('click', () => {
      window.controls?.switchTab?.('capture');
    });
    document.getElementById('tab-join').addEventListener('click', () => {
      window.controls?.switchTab?.('join');
    });
    document.getElementById('back').addEventListener('click', () => {
      window.controls?.goHome();
    });
    document.getElementById('close').addEventListener('click', () => {
      window.controls?.closeApp();
    });

    (async () => {
      try {
        const enabled = await window.controls?.getForceTabAudio?.();
        forceTabAudio.checked = !!enabled;
      } catch (_) {
        forceTabAudio.checked = true;
      }
    })();

    forceTabAudio.addEventListener('change', () => {
      window.controls?.setForceTabAudio?.(!!forceTabAudio.checked);
    });
  </script>
</body>
</html>
