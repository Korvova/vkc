<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HDMI Обычное окно</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    }
    .label {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
    }
    #v {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
  <div class="label">Обычное окно HDMI</div>
  <video id="v" autoplay playsinline muted></video>
  <script>
    (async function init() {
      const video = document.getElementById('v');
      const CAPTURE_DEVICE_LABEL = 'USB3.0 Capture Video';

      const attachFrameFallback = () => {
        const img = document.createElement('img');
        img.id = 'v';
        img.alt = 'HDMI mirror';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        img.style.background = '#000';
        img.style.display = 'block';
        video.replaceWith(img);
        window.mirrorAPI?.onFrame?.((dataUrl) => {
          if (!dataUrl) return;
          img.src = dataUrl;
        });
      };

      try {
        const hdVideoConstraints = {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          frameRate: { ideal: 30, max: 60 },
        };

        const initialStream = await navigator.mediaDevices.getUserMedia({
          video: hdVideoConstraints,
          audio: false,
        });
        const initialTrack = initialStream.getVideoTracks()[0];
        const initialLabel = initialTrack && initialTrack.label ? initialTrack.label.toLowerCase() : '';

        if (initialLabel.includes(CAPTURE_DEVICE_LABEL.toLowerCase())) {
          video.srcObject = initialStream;
          return;
        }

        const devices = await navigator.mediaDevices.enumerateDevices();
        const captureDevice = devices.find(d =>
          d.kind === 'videoinput' &&
          d.label &&
          d.label.toLowerCase().includes(CAPTURE_DEVICE_LABEL.toLowerCase())
        );

        if (!captureDevice) {
          video.srcObject = initialStream;
          return;
        }

        initialStream.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            ...hdVideoConstraints,
            deviceId: { exact: captureDevice.deviceId },
          },
          audio: false,
        });
        video.srcObject = stream;
      } catch (_) {
        attachFrameFallback();
      }
    })();
  </script>
</body>
</html>
